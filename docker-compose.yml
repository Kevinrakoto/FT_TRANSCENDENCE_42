# app_next/docker-compose.yml
services:
  vault:
    build: ./security/vault
    container_name: vault
    cap_add:
      - IPC_LOCK
    networks:
      - transcendence_net
    volumes:
      - vault_secrets:/vault/config
      - vault_data:/vault/data
      - ssl_certs:/vault/certs

  nginx:
    build: ./security/nginx
    container_name: nginx
    ports:
      - "443:443"
    depends_on:
      - vault
      - app
    networks:
      - transcendence_net
    volumes:
      - vault_secrets:/vault/config
      - ./security/nginx/conf:/etc/nginx/conf.d
      - ssl_certs:/etc/nginx/ssl:ro
  
  postgres:
    build: ./security/postgres
    networks:
      - transcendence_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - vault_secrets:/vault/config:ro
    depends_on:
      - vault

  redis:
    image: redis:7-alpine
    networks:
      - transcendence_net
    volumes:
      - redis_data:/data

  app:
    build:
      context: ./app_next
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    networks:
      - transcendence_net
    volumes:
      - ./app_next:/app
      - /app/node_modules
      - vault_secrets:/vault/config:ro
      - ssl_certs:/app/certificates:ro
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
      - vault

networks:
  transcendence_net:
    driver: bridge

volumes:
  vault_secrets:
  vault_data:
  postgres_data:
  redis_data:
  ssl_certs:
