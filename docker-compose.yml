# app_next/docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: ./app_next
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - ./app_next:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://${DB_USER:-transcendence}:${DB_PASSWORD:-transcendence123}@postgres:5432/${DB_NAME:-transcendence}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: