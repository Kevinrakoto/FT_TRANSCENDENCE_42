# docker-compose.prod.yml - Production configuration for ft_transcendence
services:
  vault:
    build: ./security/vault
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    networks:
      - transcendence_net
    volumes:
      - vault_secrets:/vault/config
      - vault_data:/vault/data
      - ssl_certs:/vault/certs

  nginx:
    build: ./security/nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8443:443"
    depends_on:
      - vault
      - app
    networks:
      - transcendence_net
    volumes:
      - vault_secrets:/vault/config
      - ./security/nginx/conf:/etc/nginx/conf.d
      - ssl_certs:/etc/nginx/ssl:ro

  postgres:
    build: ./security/postgres
    container_name: postgres
    restart: unless-stopped
    networks:
      - transcendence_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - vault_secrets:/vault/config:ro
    depends_on:
      - vault

  app:
    build:
      context: ./app_next
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - transcendence_net
    volumes:
      - vault_secrets:/vault/config:ro
      - ssl_certs:/app/certificates:ro
    depends_on:
      - postgres
      - vault

networks:
  transcendence_net:
    driver: bridge

volumes:
  vault_secrets:
  vault_data:
  postgres_data:
  ssl_certs:
